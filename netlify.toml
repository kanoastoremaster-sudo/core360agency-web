[[redirects]]
  from = "/*"
  to = "/:splat.html"
  status = 200
  conditions = {Language = ["en"], Country = ["US"]}

[[redirects]]
  from = "/servicios"
  to = "/servicios/marketing-digital"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 200

# Redirigir HTTP a HTTPS y www a non-www
[[redirects]]
  from = "http://www.core360agency.com/*"
  to = "https://core360agency.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://core360agency.com/*"
  to = "https://core360agency.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.core360agency.com/*"
  to = "https://core360agency.com/:splat"
  status = 301
  force = true

# URLs limpias - remover .html de la URL
[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true

# Páginas de error personalizadas
[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
