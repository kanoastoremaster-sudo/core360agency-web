# URLs limpias: redirige /pagina.html → /pagina (301)
[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true

# URLs limpias: sirve el archivo .html para rutas sin extensión (200 rewrite interno)
[[redirects]]
  from = "/*"
  to = "/:splat.html"
  status = 200

# /servicios/ sin página propia → va a marketing-digital
[[redirects]]
  from = "/servicios"
  to = "/servicios/marketing-digital"
  status = 301

# www → non-www
[[redirects]]
  from = "https://www.core360agency.com/*"
  to = "https://core360agency.com/:splat"
  status = 301
  force = true

[build]
  publish = "."

# Headers de seguridad para todas las páginas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

# Cache largo para assets estáticos
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
